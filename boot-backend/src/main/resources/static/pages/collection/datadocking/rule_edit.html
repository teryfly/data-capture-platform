<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit"/><!-- 让360浏览器默认选择webkit内核 -->
    <meta http-equiv="X-UA-Compatible" content="IE=10;IE=9;IE=8;IE=7;IE=EDGE">
    <link href="../../../css/bootstrap.min.css" rel="stylesheet">
    <link href="../../../css/bootstrap-table/bootstrap-table.min.css" rel="stylesheet">
    <link href="../../../css/liu-class.css" rel="stylesheet"/>
    <link href="../../../css/bootstrap.min14ed.css" rel="stylesheet"/>
    <link href="../../../layui/css/modules/layer/default/layer.css" rel="stylesheet"/>
    <link href="../../../layui/css/modules/laydate2/default/laydate.css" rel="stylesheet"/>
    <link href="../../../css/ztree/zTreeStyle/zTreeStyle.css" rel="stylesheet"/>
    <!-- 全局js -->
    <script type="text/javascript" src="../../../js/libs/jquery-2.1.1.min.js"></script>
    <script src="../../../js/bootstrap/bootstrap.min.js?v=3.3.6"></script>
    <script src="../../../js/plugin/bootstrap-table/bootstrap-table.min.js"></script>
    <script src="../../../js/plugin/bootstrap-table/tableExport.min.js"></script>
    <script src="../../../js/plugin/bootstrap-table/xlsx.core.min.js"></script>
    <script src="../../../js/plugin/bootstrap-table/bootstrap-table-mobile.min.js"></script>
    <script src="../../../js/plugin/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
    <script src="../../../js/plugin/bootstrap-table/bootstrap-editable.js"></script>
    <script src="../../../js/plugin/bootstrap-table/bootstrap-table-editable.js"></script>

    <script src="../../../js/plugin/validate/bootstrapValidator.min.js"></script>
    <script src="../../../js/plugin/validate/zh_CN.js"></script>

    <script type="text/javascript" src="../../../layui/css/modules/laydate2/laydate.js"></script>
    <script type="text/javascript" src="../../../layui/lay/modules/layer.js"></script>

    <script src="../../../js/common/ajax-object.js"></script>
    <script src="../../../js/common/jquery.base64.js"></script>
    <script src="../../../js/common/bootstrap-table-object.js"></script>
    <script src="../../../js/plugin/bootstraptree/tree-table-object.js"></script>
    <script src="../../../js/common/web-upload-object.js"></script>
    <script src="../../../js/common/ztree-object.js"></script>
    <script src="../../../js/common/image-upload.js"></script>
    <script src="../../../js/common/Feng.js"></script>
    <script src="../../../js/common/tool.js"></script>
    <script src="../../../js/common/create.js"></script>

    <script src="../../../js/plugin/bootstrap-suggest/bootstrap-suggest.js"></script>

    <script src="../../../js/plugin/ztree/jquery.ztree.all.min.js"></script>

</head>

<body class="gray-bg" style="background-color: white;">
<div class="wrapper animated fadeInRight">
    <style>
        .ui-jqgrid-bdiv {
            overflow: auto !important
        }

        table tbody .ui-row-ltr td:nth-child(n+3):hover {
            background-color: #a0f3f3;
            cursor: pointer;
        }

        .xjf {
            margin-right: 15px;

            margin-left: 30px;
        }
    </style>
    <div class="xjf ibox float-e-margins">
        <div class="ibox-content">
            <div class="form-horizontal" id="menuInfoForm">
                <div class="row">
                    <div class="col-sm-11">
                        <div class="form-group">
                            <label class="col-sm-3 control-label">字段名称</label>
                            <div class="col-sm-7">
                                <input type="hidden" id="id" name="id">
                                <input type="hidden" id="task_id" name="task_id">
                                <input class="form-control" type="hidden" id="old_name" name="old_name">
                                <input class="form-control" id="column_name" name="column_name">
                            </div>
                            <label class="text-danger control-label">*</label>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">字段编码</label>
                            <div class="col-sm-7">
                                <input class="form-control" id="column_code" name="column_code">
                            </div>
                            <label class="text-danger control-label">*</label>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">状态</label>
                            <div class="col-sm-7">
                                <select class="form-control" id="status" name="status" dafa>
                                    <option value="1" selected>启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">是否必填</label>
                            <div class="col-sm-7">
                                <select class="form-control" id="is_null" name="is_null" dafa>
                                    <option value="0">不必填</option>
                                    <option value="1" selected>必填</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">是否主键</label>
                            <div class="col-sm-7">
                                <select class="form-control" id="is_pk" name="is_pk" dafa>
                                    <option value="0" selected>否</option>
                                    <option value="1">是</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">数据规则</label>
                            <div class="col-sm-7">
                                <input class="form-control" id="regular" name="regular">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">数据元</label>
                            <div class="col-sm-7">
                                <input type="text" class="form-control" id="data_name" readonly="readonly" hidden="data_name"
                                       onclick="RuleInfoDlg.showDeptSelectTree(); return false;" style="background-color: #ffffff !important;"/>
                                <input class="form-control" type="hidden" id="data_code" name="data_code">
                                <input class="form-control" type="hidden" id="data_id" name="data_id">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">备注</label>
                            <div class="col-sm-7">
                                <textarea class="form-control" id="remark" name="remark" rows="4"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- 这是辖区和医疗机构选择的下拉框 -->
        <div id="menuContent" class="menuContent" style="display: none; position: absolute; z-index: 200;">
            <div class="row">
                <div class="col-lg-5 col-sm-5">
                    <div class="input-group">
                        <div class="input-group-btn">
                            <button data-toggle="dropdown" class="btn btn-white dropdown-toggle"
                                    type="button">查询
                            </button>
                        </div>
                        <input type="text" class="form-control" id="select_data_name" />
                    </div>
                </div>
            </div>
            <ul id="dataTree" class="ztree tree-liu" style="width: 249px !important;"></ul>
        </div>
    </div>
</div>
<script src="../../../js/collection/rule_edit.js"></script>
</body>
</html>
