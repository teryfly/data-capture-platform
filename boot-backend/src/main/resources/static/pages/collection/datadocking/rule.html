<body class="gray-bg" style="background-color: white;">
<div class="wrapper animated fadeInRight">
    <style>
        .ui-jqgrid-bdiv{
            overflow: auto!important
        }
        table tbody .ui-row-ltr td:nth-child(n+3):hover
        {
            background-color:#a0f3f3;
            cursor:pointer;
        }

        .xjf{
            margin-right: 0px;

            margin-left: 30px;
        }
    </style>
<div class="xjf liuClass">
    <div class="col-sm-12">
        <div class="ibox-content">
            <div class="row row-lg">
                <div class="col-sm-2">
                    <div class="panel panel-default">
                        <div class="panel-heading">任务名称</div>
                        <div class="panel-body dept-tree" style="height:603px;line-height:603px;overflow:auto;overflow-x:hidden;">
                            <ul id="deptTree" style="overflow: auto" class="ztree"></ul>
                        </div>
                    </div>
                </div>
                <div class="col-sm-10">
                    <div class="row">
                        <div class="col-sm-3">
                            <div style="margin-left: 14px">

                                <div class="input-group">
                                    <div class="input-group-btn">
                                        <button data-toggle="dropdown" class="btn btn-white dropdown-toggle"
                                                type="button">字段名称
                                        </button>
                                    </div>
                                    <input type="text" class="form-control" id="field_name" />
                                </div>

                            </div>
                        </div>
                        <div class="col-sm-3">

                            <button type="button" class="btn btn-info" style="background-color: #39aef5;" onclick="MgrUser.search()">
                                <i class="fa fa-search"></i>&nbsp;搜索
                            </button>

                        </div>
                        <div class="col-sm-6" style="text-align: right">

                            <div style="width: 12px;height:10px;display: inline-block;"></div>

                            <button type="button" class="btn btn-info" style="background-color: #39aef5;" onclick="MgrUser.add()">
                                <i class="fa fa-plus"></i>&nbsp;添加
                            </button>

                            <button type="button" class="btn btn-info" style="background-color: #39aef5;" onclick="MgrUser.openChangeUser()">
                                <i class="fa fa-edit"></i>&nbsp;修改
                            </button>

                            <button type="button" class="btn btn-info" style="background-color: #39aef5;" onclick="MgrUser.delRule()">
                                <i class="fa fa-remove"></i>&nbsp;删除
                            </button>
                        </div>
                    </div>
                    <!-- <div class="hidden-xs" id="menuTableToolbar" role="group">

                     </div>-->
                    <div id="tablediv">
                    <table id="menuTable" style="width:1500px">

                    </table>
                </div>
            </div>
        <!--</div>-->
        </div>
    </div>
</div>
<script src="../../../js/collection/rule.js"></script>
</div>
