<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="renderer" content="webkit" />
<!-- 让360浏览器默认选择webkit内核 -->
<meta http-equiv="X-UA-Compatible" content="IE=10;IE=9;IE=8;IE=7;IE=EDGE">
<link href="../../../css/bootstrap.min.css" rel="stylesheet">
<link href="../../../css/bootstrap-table/bootstrap-table.min.css" rel="stylesheet">
<link href="../../../css/bootstrap.min14ed.css" rel="stylesheet" />
<link href="../../../layui/css/modules/layer/default/layer.css" rel="stylesheet" />
<link href="../../../layui/css/modules/laydate2/default/laydate.css" rel="stylesheet" />
<!-- 全局js -->
<script type="text/javascript" src="../../../js/libs/jquery-2.1.1.min.js"></script>
<script src="../../../js/bootstrap/bootstrap.min.js?v=3.3.6"></script>
<script type="text/javascript" src="../../../layui/css/modules/laydate2/laydate.js"></script>
<script type="text/javascript" src="../../../layui/lay/modules/layer.js"></script>
<script src="../../../js/common/ajax-object.js"></script>
<script src="../../../js/common/jquery.base64.js"></script>
<script src="../../../js/echarts/echarts.min.js"></script>
</head>
<body class="gray-bg" style="background-color: white;overflow: hidden;">
	<div class="row" style="border: 0px red solid;width: 98%;margin-left: 10px;">
		<div class="col-sm-12" style="padding-left: 20px;height: 80px;padding-top: 20px;">
			<div class="col-sm-2">
	            <div class="form-group">
	                <label class="col-md-4 control-label">统计模式</label>
	                <div class="col-md-8" style="width: 100px">
	                    <select class="form-control input-sm" name="interest" id="interest">
								<option>上周</option>
								<option>本月</option>
								<option>本季度</option>
								<option>本年</option>
	                    </select>
	                </div>
	            </div>
            </div>
			<div class="col-sm-6">
				<button type="button" class="btn btn-info" style="background-color: #39aef5;" onclick="QualityTable.check()" >
					<i class="fa fa-search"></i>&nbsp;统计
				</button>
			</div>
	    </div>
	</div>
	<div class="row" id="main" style="border: 0px red solid;width: 98%;height: 600px;margin-left: 10px;">
	    <script type="text/javascript">
	        // 基于准备好的dom，初始化echarts实例
	        var myChart = echarts.init(document.getElementById('main'));
	        // 指定图表的配置项和数据
	        var option = {
				    title : {
				        text: '数据质量趋势图'
				    },
				    tooltip : {
				        trigger: 'axis'
				    },
				    legend: {
				        data:['合格率','错误率']
				    },
				    toolbox: {
				        show : true,
				        feature : {
				            mark : {show: true},
				            dataView : {show: true, readOnly: false},
				            magicType : {show: true, type: ['line', 'bar']},
				            restore : {show: true},
				            saveAsImage : {show: true}
				        }
				    },
				    calculable : true,
				    xAxis : [
				        {
				            type : 'category',
				            boundaryGap : false,
				            data : ['周一','周二','周三','周四','周五','周六','周日']
				        }
				    ],
				    yAxis : [
				        {
				            type : 'value',
				            axisLabel : {
				                formatter: '{value}'
				            }
				        }
				    ],
				    series : [
				        {
				            name:'合格率',
				            type:'line',
				            data:[98.2, 97.5, 88.4, 89.54, 99.4, 73.05, 90.44],
				            markPoint : {
				                data : [
				                    {type : 'max', name: '最大值'},
				                    {type : 'min', name: '最小值'}
				                ]
				            },
				            markLine : {
				                data : [
				                    {type : 'average', name: '平均值'}
				                ]
				            }
				        },
				        {
				            name:'错误率',
				            type:'line',
				            data:[1.8, 2.5, 11.6, 10.46, 0.6, 26.95, 9.56],
				            markPoint : {
				                data : [
				                    {name : '周最低', value : -2, xAxis: 1, yAxis: -1.5}
				                ]
				            },
				            markLine : {
				                data : [
				                    {type : 'average', name : '平均值'}
				                ]
				            }
				        }
				    ]
				};
	        // 使用刚指定的配置项和数据显示图表。
	        myChart.setOption(option);
	        // 相当于 document.ready，{代码}
	        $(function(){
	        })
	    </script>
</body>
</html>
<script src="../../../js/statistics/qualityStatistics.js"></script>
